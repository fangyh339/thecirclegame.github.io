<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>你与赫塔·米勒的相性10问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --ink: #17130f;
    --ink-light: #2e2720;
    --cream: #f2ead8;
    --cream-dim: #c8bfa8;
    --red: #8b2e1a;
    --red-bright: #c0392b;
    --gold: #b8956a;
    --border: rgba(184,149,106,0.25);
    --border-strong: rgba(184,149,106,0.55);
  }

  html, body {
    background: var(--ink);
    color: var(--cream);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "STSong", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Decorative grain overlay */
  #app::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* ─── COVER ─────────────────────────────── */
  #cover {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 32px 48px;
    min-height: 100vh;
  }

  .cover-top {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .cover-label {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .cover-number {
    font-size: 80px;
    line-height: 1;
    color: rgba(184,149,106,0.12);
    font-style: italic;
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: -2px;
    margin-bottom: -16px;
  }

  .cover-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: 0.06em;
    color: var(--cream);
  }

  .cover-title em {
    font-style: normal;
    color: var(--gold);
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--border-strong);
    margin: 28px 0;
  }

  .cover-desc {
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--cream-dim);
    letter-spacing: 0.04em;
  }

  .cover-bottom {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .cover-meta {
    font-size: 11.5px;
    color: rgba(200,191,168,0.5);
    letter-spacing: 0.08em;
  }

  .btn-start {
    display: block;
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--cream);
    font-size: 14px;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--border);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .btn-start:hover::before { transform: scaleX(1); }
  .btn-start:hover { border-color: var(--gold); color: var(--gold); }

  .btn-start span { position: relative; z-index: 1; }

  /* ─── QUIZ ───────────────────────────────── */
  #quiz { display: none; flex: 1; flex-direction: column; min-height: 100vh; }

  .quiz-header {
    padding: 32px 32px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .progress-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(184,149,106,0.6);
  }

  .progress-track {
    width: 100%;
    height: 1px;
    background: rgba(184,149,106,0.15);
    margin-top: 10px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .quiz-body {
    flex: 1;
    padding: 36px 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .question-num {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
  }

  .question-text {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.55;
    letter-spacing: 0.05em;
    color: var(--cream);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    text-align: left;
    color: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(184,149,106,0.06);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .option:hover::before { transform: scaleX(1); }
  .option:hover { border-color: rgba(184,149,106,0.5); }

  .option.selected {
    border-color: var(--gold);
    background: rgba(184,149,106,0.1);
  }

  .option.selected::before { transform: scaleX(1); }

  .option.selected .opt-letter {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  .opt-letter {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border: 1px solid rgba(184,149,106,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0;
    color: var(--gold);
    transition: all 0.25s;
    position: relative;
    z-index: 1;
  }

  .opt-text {
    font-size: 14.5px;
    line-height: 1.65;
    letter-spacing: 0.04em;
    padding-top: 3px;
    position: relative;
    z-index: 1;
  }

  .quiz-footer {
    padding: 0 32px 48px;
  }

  .btn-next {
    display: block;
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid rgba(184,149,106,0.25);
    color: rgba(200,191,168,0.35);
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: not-allowed;
    font-family: inherit;
    transition: all 0.35s;
  }

  .btn-next.active {
    border-color: var(--gold);
    color: var(--gold);
    cursor: pointer;
  }

  .btn-next.active:hover {
    background: rgba(184,149,106,0.1);
  }

  /* ─── RESULT ─────────────────────────────── */
  #result { display: none; flex: 1; flex-direction: column; min-height: 100vh; }

  .result-header {
    padding: 52px 32px 0;
  }

  .result-score-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }

  .score-big {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 64px;
    line-height: 1;
    color: var(--gold);
    font-style: italic;
  }

  .score-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(184,149,106,0.5);
  }

  .result-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .result-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold);
    border: 1px solid var(--border-strong);
    padding: 5px 12px;
    margin-bottom: 20px;
  }

  .result-title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: 0.06em;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .result-body {
    padding: 0 32px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .result-desc {
    font-size: 15px;
    line-height: 2;
    color: var(--cream-dim);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }

  .result-books {
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .books-label {
    font-size: 10.5px;
    letter-spacing: 0.35em;
    color: rgba(184,149,106,0.55);
    margin-bottom: 16px;
  }

  .book-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(184,149,106,0.1);
    font-size: 14px;
    color: var(--cream);
    letter-spacing: 0.05em;
  }

  .book-item:last-child { border-bottom: none; }

  .book-dot {
    width: 4px;
    height: 4px;
    min-width: 4px;
    background: var(--gold);
    border-radius: 50%;
    margin-top: 7px;
  }

  .btn-restart {
    display: block;
    width: 100%;
    padding: 17px;
    background: transparent;
    border: 1px solid var(--border);
    color: rgba(200,191,168,0.5);
    font-size: 12px;
    letter-spacing: 0.25em;
    cursor: pointer;
    font-family: inherit;
    margin-top: 40px;
    transition: all 0.3s;
  }

  .btn-restart:hover {
    border-color: rgba(184,149,106,0.4);
    color: var(--cream-dim);
  }

  /* ─── TRANSITIONS ────────────────────────── */
  .fade-in { animation: fadeIn 0.5s ease forwards; }
  .slide-up { animation: slideUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-transition {
    animation: screenIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes screenIn {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- COVER -->
  <div id="cover">
    <div class="cover-top">
      <p class="cover-label">Literary Affinity Test</p>
      <div class="cover-number">10</div>
      <h1 class="cover-title">你与<em>赫塔·米勒</em>的<br>相性10问</h1>
      <div class="divider"></div>
      <p class="cover-desc">每一道题，从四个选项中选择<br>最符合自己直觉的答案。<br><br>你与她之间，究竟有多近？</p>
    </div>
    <div class="cover-bottom">
      <p class="cover-meta">10问 · 约3分钟</p>
      <button class="btn-start" onclick="startQuiz()"><span>开始测试 →</span></button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="quiz-header">
      <div class="progress-row">
        <span class="progress-label" id="progress-text">第 1 题 / 共 10 题</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:10%"></div>
      </div>
    </div>
    <div class="quiz-body">
      <p class="question-num" id="q-num">QUESTION 01</p>
      <h2 class="question-text" id="q-text"></h2>
      <div class="options" id="options-container"></div>
    </div>
    <div class="quiz-footer">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">继续 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-header">
      <div class="result-score-row">
        <span class="score-big" id="score-display">0</span>
        <span class="score-label">/ 40 分</span>
      </div>
      <div class="result-divider"></div>
      <div class="result-tag" id="result-tag"></div>
      <h2 class="result-title" id="result-title"></h2>
    </div>
    <div class="result-body">
      <p class="result-desc" id="result-desc"></p>
      <div class="result-books">
        <p class="books-label">RECOMMENDED READING</p>
        <div id="book-list"></div>
      </div>
      <button class="btn-restart" onclick="restartQuiz()">↺ 重新测试</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "你相信语言是什么？",
    options: [
      { letter: "A", text: "沟通工具", score: 2 },
      { letter: "B", text: "思考的容器", score: 3 },
      { letter: "C", text: "武器和庇护所", score: 4 },
      { letter: "D", text: "漂亮的装饰", score: 1 }
    ]
  },
  {
    text: "面对权力，你更可能——",
    options: [
      { letter: "A", text: "学着适应", score: 1 },
      { letter: "B", text: "保持怀疑", score: 4 },
      { letter: "C", text: "直接反抗", score: 3 },
      { letter: "D", text: "尽量避开", score: 2 }
    ]
  },
  {
    text: "你喜欢怎样的文学语言？",
    options: [
      { letter: "A", text: "平实自然", score: 2 },
      { letter: "B", text: "华丽繁复", score: 1 },
      { letter: "C", text: "梦幻朦胧", score: 3 },
      { letter: "D", text: "冷峻锋利", score: 4 }
    ]
  },
  {
    text: "如果必须离开故乡，你会觉得——",
    options: [
      { letter: "A", text: "解脱", score: 3 },
      { letter: "B", text: "不舍", score: 2 },
      { letter: "C", text: "故乡会继续跟着我", score: 4 },
      { letter: "D", text: "去哪里都一样", score: 1 }
    ]
  },
  {
    text: "你更关注一个人的——",
    options: [
      { letter: "A", text: "命运", score: 1 },
      { letter: "B", text: "记忆", score: 3 },
      { letter: "C", text: "身体", score: 2 },
      { letter: "D", text: "恐惧", score: 4 }
    ]
  },
  {
    text: "你理想中的阅读体验是——",
    options: [
      { letter: "A", text: "温暖舒适的陪伴", score: 2 },
      { letter: "B", text: "带来思想震荡", score: 3 },
      { letter: "C", text: "轻松愉快的消遣", score: 1 },
      { letter: "D", text: "被刺痛却无法移开目光", score: 4 }
    ]
  },
  {
    text: "面对荒诞现实，你会——",
    options: [
      { letter: "A", text: "苦笑", score: 2 },
      { letter: "B", text: "愤怒", score: 3 },
      { letter: "C", text: "记录下来", score: 4 },
      { letter: "D", text: "假装没看见", score: 1 }
    ]
  },
  {
    text: "你认为创伤会——",
    options: [
      { letter: "A", text: "随时间消失", score: 1 },
      { letter: "B", text: "留下疤痕", score: 2 },
      { letter: "C", text: "改变语言和感知", score: 4 },
      { letter: "D", text: "只有当事人才懂", score: 3 }
    ]
  },
  {
    text: "你更偏爱哪种叙事？",
    options: [
      { letter: "A", text: "清晰、完整、逻辑性强", score: 1 },
      { letter: "B", text: "多线并进", score: 3 },
      { letter: "C", text: "片段、跳跃、隐喻密布", score: 4 },
      { letter: "D", text: "对话推动", score: 2 }
    ]
  },
  {
    text: "你读小说最想获得什么？",
    options: [
      { letter: "A", text: "新的感知方式", score: 4 },
      { letter: "B", text: "与内容的共鸣", score: 3 },
      { letter: "C", text: "故事", score: 1 },
      { letter: "D", text: "知识", score: 2 }
    ]
  }
];

const results = [
  {
    range: [34, 40],
    tag: "34 — 40 分",
    title: "命运共同体",
    desc: "你和赫塔·米勒共享一套感知系统。\n\n你们都知道语言会受伤，也知道伤口会说话。",
    books: ["《呼吸秋千》", "《心兽》", "《今天我不愿面对自己》"]
  },
  {
    range: [26, 33],
    tag: "26 — 33 分",
    title: "危险吸引",
    desc: "你很容易爱上她，也很容易被她刺痛。",
    books: ["《狐狸那时已是猎人》", "《低地》"]
  },
  {
    range: [18, 25],
    tag: "18 — 25 分",
    title: "谨慎靠近",
    desc: "你需要适应她独特的节奏和锋利。",
    books: ["《国王鞠躬，国王杀人》", "《一颗热土豆是一张温暖的床》"]
  },
  {
    range: [10, 17],
    tag: "10 — 17 分",
    title: "相爱相杀",
    desc: "她会让你困惑，但也可能让你着迷。",
    books: ["《低地》"]
  },
  {
    range: [0, 9],
    tag: "10 分以下",
    title: "保持观察",
    desc: "暂时不必勉强。\n\n赫塔不是每个人的第一眼心动，但她很擅长成为后来的念念不忘。",
    books: []
  }
];

let currentQ = 0;
let totalScore = 0;
let selectedOption = null;

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  const quiz = document.getElementById('quiz');
  quiz.style.display = 'flex';
  quiz.classList.add('screen-transition');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const numStr = String(currentQ + 1).padStart(2, '0');

  document.getElementById('progress-text').textContent = `第 ${currentQ + 1} 题 / 共 10 题`;
  document.getElementById('progress-fill').style.width = `${(currentQ + 1) * 10}%`;
  document.getElementById('q-num').textContent = `QUESTION ${numStr}`;
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.style.animationDelay = `${i * 0.07}s`;
    btn.classList.add('slide-up');
    btn.innerHTML = `<span class="opt-letter">${opt.letter}</span><span class="opt-text">${opt.text}</span>`;
    btn.onclick = () => selectOption(btn, opt.score);
    container.appendChild(btn);
  });

  selectedOption = null;
  document.getElementById('btn-next').className = 'btn-next';
  document.getElementById('q-text').classList.add('fade-in');
}

function selectOption(btn, score) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = score;
  document.getElementById('btn-next').className = 'btn-next active';
}

function nextQuestion() {
  if (selectedOption === null) return;
  totalScore += selectedOption;
  selectedOption = null;

  if (currentQ < questions.length - 1) {
    currentQ++;
    const body = document.getElementById('quiz');
    body.classList.remove('screen-transition');
    void body.offsetWidth;
    body.classList.add('screen-transition');
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'flex';
  resultEl.classList.add('screen-transition');

  const res = results.find(r => totalScore >= r.range[0] && totalScore <= r.range[1]);

  // Animate score counter
  const scoreEl = document.getElementById('score-display');
  let count = 0;
  const target = totalScore;
  const duration = 800;
  const step = Math.ceil(duration / (target || 1));
  const timer = setInterval(() => {
    count = Math.min(count + 1, target);
    scoreEl.textContent = count;
    if (count >= target) clearInterval(timer);
  }, step);

  document.getElementById('result-tag').textContent = res.tag;
  document.getElementById('result-title').textContent = res.title;
  document.getElementById('result-desc').textContent = res.desc;

  const bookList = document.getElementById('book-list');
  bookList.innerHTML = '';
  if (res.books.length > 0) {
    res.books.forEach(b => {
      const div = document.createElement('div');
      div.className = 'book-item';
      div.innerHTML = `<span class="book-dot"></span><span>${b}</span>`;
      bookList.appendChild(div);
    });
  } else {
    bookList.closest('.result-books').style.display = 'none';
  }
}

function restartQuiz() {
  currentQ = 0;
  totalScore = 0;
  selectedOption = null;

  document.getElementById('result').style.display = 'none';
  const quiz = document.getElementById('quiz');
  quiz.style.display = 'flex';
  quiz.classList.add('screen-transition');
  renderQuestion();
}
</script>
</body>
</html>
